# Build the Quizmaster image on push to main and push it to GHCR tagged with the git SHA.
# Self-contained (docker/build-push-action + GITHUB_TOKEN) — no org-specific composite action.
# The Argo CD Image Updater watches GHCR for new SHA tags and rewrites deploy/kustomization.yaml.
name: build-images

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/guuse/quizmaster:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
