<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale intentionally NOT capped below the OS minimum; we keep inputs ≥16px
         to avoid iOS auto-zoom rather than disabling zoom (accessibility). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="Quizmaster — a live multiplayer AI quiz game. Claude writes the quiz, nobody sees the answers, everyone plays live." />
    <title>Quizmaster</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("qm.theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
