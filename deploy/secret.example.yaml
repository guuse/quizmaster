# EXAMPLE ONLY — do NOT commit real values, and this file is NOT in kustomization.yaml.
# Apply the real Secret out-of-band, the same pattern as cloudflare-token:
#
#   kubectl -n quizmaster create secret generic quizmaster-secrets \
#     --from-literal=CLAUDE_SDK_TOKEN=sk-ant-oat01-... \
#     --from-literal=SESSION_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=GOOGLE_CLIENT_ID=...apps.googleusercontent.com \
#     --from-literal=GOOGLE_CLIENT_SECRET=... \
#     --from-literal=OAUTH_REDIRECT_URI=https://quizmaster.tailXXXX.ts.net/api/auth/google/callback
#
# The Claude credential (ONE of ANTHROPIC_API_KEY or CLAUDE_SDK_TOKEN) and SESSION_SECRET are
# required; the GOOGLE_*/OAUTH_REDIRECT_URI keys are optional (creator sign-in is disabled until
# they are set). Also create a `ghcr-pull` secret in this namespace for the private GHCR image,
# or make the ghcr.io/guuse/quizmaster package public.
apiVersion: v1
kind: Secret
metadata:
  name: quizmaster-secrets
  namespace: quizmaster
type: Opaque
stringData:
  # Provide ONE of these two Claude credentials:
  CLAUDE_SDK_TOKEN: "REPLACE_ME"        # sk-ant-oat01-… OAuth token (what the repo .env uses)
  # ANTHROPIC_API_KEY: "REPLACE_ME"     # …or a classic API key
  SESSION_SECRET: "REPLACE_ME"
  GOOGLE_CLIENT_ID: "REPLACE_ME"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME"
  OAUTH_REDIRECT_URI: "https://quizmaster.tailXXXX.ts.net/api/auth/google/callback"
