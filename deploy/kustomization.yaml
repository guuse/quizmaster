apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# All resources land in the quizmaster namespace (the Argo CD Application creates it
# with CreateNamespace=true).
namespace: quizmaster
resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - tailscale-funnel-ingress.yaml
# The Argo CD Image Updater rewrites `newTag` here on each new build.
images:
  - name: ghcr.io/guuse/quizmaster
    newTag: c13738dedb2b9ca6a9c400cd7e250c177f03ee14
    newName: ghcr.io/guuse/quizmaster
